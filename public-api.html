<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeminarDesk Public API Documentation</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="images/img-companyavatar-colorful.png">
    <!-- Swagger UI -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.21.0/swagger-ui.min.css" integrity="sha512-wWpxfn2bFvPwxuqDyiJbVB0WR3ffSqJNMMryNP07frPJ1h5Xg9HIDMV1wRr1rpxT5E+KTxDrKTuWfGb1RcV8SA==" crossorigin="anonymous">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo-title">
                <a href="/" class="logo-link">
                    <img src="images/seminardesk-logo-fullcolor.svg" alt="SeminarDesk Logo" class="logo">
                </a>
                <h1>Public API Documentation</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="/private-api">Private API</a></li>
                    <li><a href="/public-api" class="active">Public API</a></li>
                    <li><a href="/webhooks">Webhooks</a></li>
                    <li><a href="https://www.seminardesk.de" target="_blank" rel="noopener noreferrer" class="website-link">Visit Website <img src="icons/external-link.svg" alt="External link" class="icon icon-external"></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="version-control">
            <label for="version-select">Select Version:</label>
            <div class="version-select-wrapper">
                <select id="version-select" class="version-select">
                    <option value="v1">v1 (Stable)</option>
                    <option value="v1-next">v1-next (Development)</option>
                </select>
            </div>
        </div>

        <div class="api-docs-card">
            <div id="swagger-ui"></div>
        </div>
    </main>

    <footer class="container">
        <p>&copy; SeminarDesk. All rights reserved.</p>
        <p><a href="https://www.seminardesk.de" target="_blank" rel="noopener noreferrer" class="website-link">Visit SeminarDesk Website <img src="icons/external-link.svg" alt="External link" class="icon icon-external"></a></p>
    </footer>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.21.0/swagger-ui-bundle.min.js" integrity="sha512-U4Jr5QoQ92IWjtk2O8PwODhOXws1qUsT+nfedj+hZQK/wrh/pufkMyaiWXAQ6x/l+fM2SHwkzmQI/JaXbZMAQA==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.21.0/swagger-ui-standalone-preset.min.js" integrity="sha512-yJlD9FXQ7YaxAKXhviHSt/0KqWDCkLFdCnk0Ti23HXDMEQtHLAAWMHZ+POglC1mx/MOUB//h8kci3U1JYrywpQ==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js" integrity="sha512-CSBhVREyzHAjAFfBlIBakjoRUKp5h7VSweP0InR/pAJyptH7peuhCsqAI/snV+TwZmXZqoUklpXp6R6wMnYf5Q==" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
